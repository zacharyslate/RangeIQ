name: Deploy Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rangeiq-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_SSH_PRIVATE_KEY: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${DROPLET_HOST}"
          test -n "${DROPLET_USER}"
          test -n "${DROPLET_SSH_PRIVATE_KEY}"

      - name: Prepare SSH
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_SSH_PORT }}
          DROPLET_SSH_PRIVATE_KEY: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          PORT="${DROPLET_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${DROPLET_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT}" -H "${DROPLET_HOST}" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_SSH_PORT }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PORT="${DROPLET_PORT:-22}"
          ssh -p "${PORT}" "${DROPLET_USER}@${DROPLET_HOST}" \
            "set -euo pipefail; \
             APP_DIR='/opt/rangeiq'; \
             APP_USER='rangeiq'; \
             SERVICE_NAME='rangeiq'; \
             echo '==> Deploy target commit: ${GITHUB_SHA}'; \
             sudo -u \"${APP_USER}\" git -C \"${APP_DIR}\" fetch origin; \
             sudo -u \"${APP_USER}\" git -C \"${APP_DIR}\" checkout main; \
             sudo -u \"${APP_USER}\" git -C \"${APP_DIR}\" pull --ff-only origin main; \
             sudo -u \"${APP_USER}\" \"${APP_DIR}/.venv/bin/pip\" install -e \"${APP_DIR}\"; \
             sudo systemctl restart \"${SERVICE_NAME}\"; \
             sudo systemctl is-active --quiet \"${SERVICE_NAME}\"; \
             sudo journalctl -u \"${SERVICE_NAME}\" -n 20 --no-pager"
